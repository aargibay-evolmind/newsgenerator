services:
  backend:
    build:
      context: ./docker/php
      args:
        UID: 1000
        GID: 1000
    volumes:
      - ./backend:/var/www/backend
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      - mysql

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/node/Dockerfile
      args:
        UID: 1000
        GID: 1000
    working_dir: /var/www/frontend
    command: npm run dev
    environment:
      VITE_GEMINI_API_KEY: ${GEMINI_API_KEY}
    volumes:
      - ./frontend:/var/www/frontend
      - /var/www/frontend/node_modules 
    extra_hosts:
      - "backend.newsgenerator.test:host-gateway"

  nginx:
    build:
      context: ./docker/nginx
      args:
        UID: 1000
        GID: 1000
    volumes:
      - ./backend:/var/www/backend
      - ./frontend:/var/www/frontend
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - backend
    ports:
      - "80:80"

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: database
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3336:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
